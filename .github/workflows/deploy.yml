name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: dev-codex-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/apps/dev-codex
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            docker compose -f /opt/apps/docker-compose.yml build dev-codex
            docker compose -f /opt/apps/docker-compose.yml up -d dev-codex

      - name: Verify live health endpoint
        run: |
          for i in {1..12}; do
            if curl -fsS --max-time 10 https://dev-codex.com/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Dev Codex health check failed after deploy" >&2
          exit 1
